        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
        "502":
          $ref: "#/components/responses/GatewayError"
  /internal/provider/text/stream:
    post:
      operationId: internalProviderTextStream
      summary: Internal Provider Gateway text stream
      description: Internal API. Requires bearer service token and streams provider.delta/provider.completed events.
      security:
        - serviceTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayTextRequest"
      responses:
        "200":
          description: Server-sent text stream with provider.delta and provider.completed events
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
  /internal/provider/manifests/test-run:
    post:
      operationId: internalProviderManifestTestRun
      summary: Internal Provider Gateway manifest test run
      description: Internal API. Requires bearer service token and keeps direct provider execution inside Provider Gateway.
      security:
        - serviceTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayManifestTestRunRequest"
      responses:
        "200":
          description: Declarative provider test result executed by Provider Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestTestRunResultEnvelope"
        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
        "502":
          $ref: "#/components/responses/GatewayError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: service-token
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetId:
      name: assetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkflowRunId:
      name: workflowRunId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaFileId:
      name: mediaFileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ModelId:
      name: modelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProfileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BindingId:
      name: bindingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizationHeader:
      name: X-Organization-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 200
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    GatewayError:
      description: Internal Provider Gateway error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorEnvelope"
  schemas:
    Envelope:
      type: object
      required: [requestId]
      properties:
        requestId:
          type: string
        data: {}
        meta: {}
    ErrorEnvelope:
      type: object
      required: [requestId, error]
      properties:
        requestId:
          type: string
        error:
          $ref: "#/components/schemas/ErrorBody"
    ErrorBody:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        details: {}
        retryable:
          type: boolean
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
        organizationName:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    AuthEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthToken"
    MeEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: "#/components/schemas/User"
                organizationId:
                  type: string
                  format: uuid
    AuthToken:
      type: object
      required: [accessToken, expiresIn, refreshToken, user]
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
        refreshToken:
          type: string
        organizationId:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
    Organization:
      type: object
      required: [id, name, slug, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
    Workspace:
      type: object
      required: [id, organizationId, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    Project:
      type: object
      required: [id, organizationId, workspaceId, name, settings, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        projectType:
          type: string
        aspectRatio:
          type: string
        settings:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Asset:
      type: object
      required: [id, organizationId, projectId, assetType, name, metadata, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        assetType:
          type: string
        name:
          type: string
        description:
          type: string
        currentArtifactId:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateAssetRequest:
      type: object
      required: [assetType, name]
      properties:
        assetType:
          type: string
        name:
          type: string
        description:
          type: string
        currentArtifactId:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true
        idempotencyKey:
          type: string
          maxLength: 200
    UpdateAssetRequest:
      type: object
      properties:
        assetType:
          type: string
        name:
          type: string
        description:
          type: string
        currentArtifactId:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true
    CreateAssetUploadUrlRequest:
      type: object
      required: [fileName, mimeType]
      properties:
        fileName:
          type: string
        mimeType:
          type: string
        assetType:
          type: string
        expiresSeconds:
          type: integer
    AssetUploadUrl:
      type: object
      required: [storageKey, uploadUrl, method, headers, expiresAt]
      properties:
        storageKey:
          type: string
        uploadUrl:
          type: string
          format: uri
        method:
          type: string
        headers:
          type: object
          additionalProperties: true
        expiresAt:
          type: string
          format: date-time
    AssetVariant:
      type: object
      required: [id, mediaFileId, variantType, storageKey, mimeType, metadata, createdAt]
      properties:
        id:
          type: string
          format: uuid
        mediaFileId:
          type: string
          format: uuid
        variantType:
          type: string
        storageKey:
          type: string
        mimeType:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    CreateAssetVariantRequest:
      type: object
      required: [storageKey, mimeType]
      properties:
        variantType:
          type: string
          default: original
        storageKey:
          type: string
        mimeType:
          type: string
        byteSize:
          type: integer
          format: int64
        width:
          type: integer
        height:
          type: integer
        durationSeconds:
          type: number
        checksum:
          type: string
        metadata:
          type: object
          additionalProperties: true
        idempotencyKey:
          type: string
          maxLength: 200
    AssetVariantCreateResult:
      type: object
      required: [asset, artifactId, mediaFileId, variant]
      properties:
        asset:
          $ref: "#/components/schemas/Asset"
        artifactId:
          type: string
          format: uuid
        mediaFileId:
          type: string
          format: uuid
        variant:
          $ref: "#/components/schemas/AssetVariant"
    WorkflowRun:
      type: object
      required: [id, organizationId, projectId, temporalWorkflowId, status, input, output, createdBy, createdAt]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        temporalWorkflowId:
          type: string
        status:
          type: string
          enum: [queued, running, cancelling, succeeded, failed, cancelled]
        input:
          type: object
          additionalProperties: true
        output:
          description: Workflow output. text_to_storyboard returns TextToStoryboardOutput; video_production returns VideoProductionOutput.
          oneOf:
            - $ref: "#/components/schemas/TextToStoryboardOutput"
            - $ref: "#/components/schemas/VideoProductionOutput"
            - type: object
              additionalProperties: true
        errorCode:
          type: string
        errorMessage:
          type: string
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
