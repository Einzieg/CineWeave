          properties:
            sourceId:
              type: string
              format: uuid
            planId:
              type: string
              format: uuid
            eventIds:
              type: array
              items:
                type: string
                format: uuid
            chapterIds:
              type: array
              items:
                type: string
                format: uuid
            force:
              type: boolean
            instruction:
              type: string
            title:
              type: string
            scriptId:
              type: string
              format: uuid
            duration:
              type: number
              default: 5
            aspectRatio:
              type: string
              default: "16:9"
            resolution:
              type: string
              default: "720p"
            pollIntervalSeconds:
              type: integer
              default: 5
            maxPolls:
              type: integer
              default: 120
            maxShots:
              type: integer
              minimum: 1
              maximum: 3
              default: 3
            skipCompose:
              type: boolean
              default: false
            generateAssets:
              type: boolean
              default: true
            generateDerivedAssets:
              type: boolean
              default: false
        idempotencyKey:
          type: string
          maxLength: 200
