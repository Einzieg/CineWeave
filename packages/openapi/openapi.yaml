openapi: 3.1.0
info:
  title: CineWeave API
  version: 0.1.0
  description: API contract seed for the Phase 1 CineWeave control plane.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/system/status:
    get:
      operationId: getSystemStatus
      responses:
        "200":
          description: Non-sensitive system readiness status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatusEnvelope"
  /api/system/setup-state:
    get:
      operationId: getSystemSetupState
      responses:
        "200":
          description: Whether the deployment needs first-run setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStateResponseEnvelope"
  /api/system/setup:
    post:
      operationId: setupSystem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSetupRequest"
      responses:
        "201":
          description: First administrator session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSetupResponseEnvelope"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/auth/register:
    post:
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user with initial organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/refresh:
    post:
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Rotated refresh token and access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/logout:
    post:
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/auth/me:
    get:
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/provider-webhooks/{providerAccountId}/{webhookSecret}:
    post:
      operationId: receiveProviderWebhook
      parameters:
        - name: providerAccountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: webhookSecret
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderWebhookResultEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/organizations:
    get:
      operationId: listOrganizations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations for current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListEnvelope"
    post:
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationEnvelope"
  /api/organizations/{organizationId}:
    get:
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Organization detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/workspaces:
    get:
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Workspaces in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListEnvelope"
    post:
      operationId: createWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
  /api/workspaces/{workspaceId}:
    get:
      operationId: getWorkspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
  /api/teams:
    get:
      operationId: listTeams
      description: Requires team.read on the organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Teams in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamListEnvelope"
        "403":
          $ref: "#/components/responses/Error"
    post:
      operationId: createTeam
      description: Requires team.manage on the organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
        "403":
          $ref: "#/components/responses/Error"
  /api/teams/{teamId}:
    get:
      operationId: getTeam
      description: Requires team.read.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
    patch:
      operationId: updateTeam
      description: Requires team.manage.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
    delete:
      operationId: deleteTeam
      description: Requires team.manage.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Disabled team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/teams/{teamId}/members:
    get:
      operationId: listTeamMembers
      description: Requires team.read.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberListEnvelope"
    post:
      operationId: addTeamMember
      description: Requires team.manage.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeamMemberRequest"
      responses:
        "201":
          description: Added team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberEnvelope"
  /api/teams/{teamId}/members/{userId}:
    delete:
      operationId: removeTeamMember
      description: Requires team.manage.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Disabled team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/roles:
    get:
      operationId: listRoles
      description: Requires role.read.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListEnvelope"
  /api/permissions:
    get:
      operationId: listPermissions
      description: Requires role.read.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionListEnvelope"
  /api/role-bindings:
    get:
      operationId: listRoleBindings
      description: Requires role.read.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Role bindings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleBindingListEnvelope"
    post:
      operationId: createRoleBinding
      description: Requires role.manage.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleBindingRequest"
      responses:
        "201":
          description: Created role binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleBindingEnvelope"
  /api/role-bindings/{roleBindingId}:
    delete:
      operationId: deleteRoleBinding
      description: Requires role.manage and cannot delete the caller's last org_owner binding.
      security:
        - bearerAuth: []
      parameters:
        - name: roleBindingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted role binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/projects:
    get:
      operationId: listProjects
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[workspaceId]
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Projects in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListEnvelope"
    post:
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
  /api/projects/{projectId}:
    get:
      operationId: getProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
    patch:
      operationId: updateProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
    delete:
      operationId: deleteProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Deleted project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/projects/{projectId}/production/status:
    get:
      operationId: getProductionStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project production board status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionStatusEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/production/actions:
    post:
      operationId: runProductionAction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductionActionRequest"
      responses:
        "202":
          description: Production stage action queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionActionResponseEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/regenerate:
    post:
      operationId: regenerateCreativeObject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateRequest"
      responses:
        "202":
          description: Partial regeneration workflow queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateResponseEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/sources:
    get:
      operationId: listProjectSources
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSourceListEnvelope"
    post:
      operationId: createProjectSource
      description: Paste text into a project source. Novel sources can split chapters; script sources can initialize script/version.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectSourceRequest"
      responses:
        "201":
          description: Imported project source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProjectSourceResponseEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/sources/import:
    post:
      operationId: importProjectSourceFile
      description: Upload a txt, md, or markdown file as a novel/script source.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ImportProjectSourceRequest"
      responses:
        "201":
          description: Imported project source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProjectSourceResponseEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/projects/{projectId}/sources/{sourceId}:
    get:
      operationId: getProjectSource
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Project source detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSourceEnvelope"
    patch:
      operationId: updateProjectSource
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectSourceRequest"
      responses:
        "200":
          description: Updated project source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSourceEnvelope"
    delete:
      operationId: deleteProjectSource
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Deleted project source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/projects/{projectId}/sources/{sourceId}/extract-events:
    post:
      operationId: extractNovelEvents
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractNovelEventsRequest"
      responses:
        "202":
          description: Started extract_novel_events workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunEnvelope"
  /api/projects/{projectId}/sources/{sourceId}/events:
    get:
      operationId: listSourceNovelEvents
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Source novel events and links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NovelEventListEnvelope"
  /api/projects/{projectId}/sources/{sourceId}/generate-adaptation-plan:
    post:
      operationId: generateAdaptationPlan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/SourceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateAdaptationPlanRequest"
      responses:
        "201":
          description: Generated adaptation plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdaptationPlanEnvelope"
  /api/projects/{projectId}/novel-events/{eventId}:
    get:
      operationId: getNovelEvent
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Novel event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NovelEventEnvelope"
    patch:
      operationId: updateNovelEvent
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNovelEventRequest"
      responses:
        "200":
          description: Updated novel event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NovelEventEnvelope"
  /api/projects/{projectId}/novel-events/{eventId}/review:
    post:
      operationId: reviewNovelEvent
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRequest"
      responses:
        "200":
          description: Reviewed novel event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponseEnvelope"
  /api/projects/{projectId}/scripts:
    get:
      operationId: listScripts
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project scripts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptListEnvelope"
    post:
      operationId: createScript
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScriptRequest"
      responses:
        "201":
          description: Created script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptEnvelope"
  /api/projects/{projectId}/scripts/{scriptId}:
    get:
      operationId: getScript
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ScriptId"
      responses:
        "200":
          description: Script detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptEnvelope"
    patch:
      operationId: updateScript
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ScriptId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScriptRequest"
      responses:
        "200":
          description: Updated script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptEnvelope"
  /api/projects/{projectId}/scripts/{scriptId}/versions:
    get:
      operationId: listScriptVersions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ScriptId"
      responses:
        "200":
          description: Script versions
          content:
            application/json:
              schema:
