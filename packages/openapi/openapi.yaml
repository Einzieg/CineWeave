openapi: 3.1.0
info:
  title: CineWeave API
  version: 0.1.0
  description: API contract seed for the Phase 1 CineWeave control plane.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/auth/register:
    post:
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user with initial organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/refresh:
    post:
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Rotated refresh token and access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/logout:
    post:
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/auth/me:
    get:
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/provider-webhooks/{providerAccountId}/{webhookSecret}:
    post:
      operationId: receiveProviderWebhook
      parameters:
        - name: providerAccountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: webhookSecret
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderWebhookResultEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/organizations:
    get:
      operationId: listOrganizations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations for current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListEnvelope"
    post:
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationEnvelope"
  /api/organizations/{organizationId}:
    get:
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Organization detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/workspaces:
    get:
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Workspaces in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListEnvelope"
    post:
      operationId: createWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
  /api/workspaces/{workspaceId}:
    get:
      operationId: getWorkspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
  /api/teams:
    get:
      operationId: listTeams
      description: Requires team.read on the organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Teams in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamListEnvelope"
        "403":
          $ref: "#/components/responses/Error"
    post:
      operationId: createTeam
      description: Requires team.manage on the organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
        "403":
          $ref: "#/components/responses/Error"
  /api/teams/{teamId}:
    get:
      operationId: getTeam
      description: Requires team.read.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
    patch:
      operationId: updateTeam
      description: Requires team.manage.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
    delete:
      operationId: deleteTeam
      description: Requires team.manage.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Disabled team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/teams/{teamId}/members:
    get:
      operationId: listTeamMembers
      description: Requires team.read.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberListEnvelope"
    post:
      operationId: addTeamMember
      description: Requires team.manage.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeamMemberRequest"
      responses:
        "201":
          description: Added team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberEnvelope"
  /api/teams/{teamId}/members/{userId}:
    delete:
      operationId: removeTeamMember
      description: Requires team.manage.
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Disabled team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/roles:
    get:
      operationId: listRoles
      description: Requires role.read.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListEnvelope"
  /api/permissions:
    get:
      operationId: listPermissions
      description: Requires role.read.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionListEnvelope"
  /api/role-bindings:
    get:
      operationId: listRoleBindings
      description: Requires role.read.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Role bindings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleBindingListEnvelope"
    post:
      operationId: createRoleBinding
      description: Requires role.manage.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleBindingRequest"
      responses:
        "201":
          description: Created role binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleBindingEnvelope"
  /api/role-bindings/{roleBindingId}:
    delete:
      operationId: deleteRoleBinding
      description: Requires role.manage and cannot delete the caller's last org_owner binding.
      security:
        - bearerAuth: []
      parameters:
        - name: roleBindingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted role binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/projects:
    get:
      operationId: listProjects
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[workspaceId]
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Projects in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListEnvelope"
    post:
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
  /api/projects/{projectId}:
    get:
      operationId: getProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
    patch:
      operationId: updateProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
    delete:
      operationId: deleteProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Deleted project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/projects/{projectId}/assets:
    get:
      operationId: listAssets
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: filter[type]
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Project assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListEnvelope"
    post:
      operationId: createAsset
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
        "200":
          description: Idempotent replay of a previous asset create
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
  /api/projects/{projectId}/assets/upload-url:
    post:
      operationId: createAssetUploadUrl
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetUploadUrlRequest"
      responses:
        "201":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetUploadUrlEnvelope"
  /api/projects/{projectId}/assets/{assetId}:
    get:
      operationId: getAsset
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
    patch:
      operationId: updateAsset
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetRequest"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
    delete:
      operationId: deleteAsset
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Deleted asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/projects/{projectId}/assets/{assetId}/variants:
    post:
      operationId: createAssetVariant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AssetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetVariantRequest"
      responses:
        "201":
          description: Created asset media variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetVariantCreateEnvelope"
        "200":
          description: Idempotent replay of a previous asset variant create
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetVariantCreateEnvelope"
  /api/workflow-runs:
    get:
      operationId: listWorkflowRuns
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[projectId]
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workflow runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunListEnvelope"
    post:
      operationId: createWorkflowRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowRunRequest"
      responses:
        "201":
          description: Created workflow run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunEnvelope"
        "200":
          description: Idempotent replay of a previously created workflow run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunEnvelope"
        "422":
          $ref: "#/components/responses/Error"
  /api/workflow-runs/{workflowRunId}:
    get:
      operationId: getWorkflowRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkflowRunId"
      responses:
        "200":
          description: Workflow run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/workflow-runs/{workflowRunId}/cancel:
    post:
      operationId: cancelWorkflowRun
      summary: Cancel a workflow run
      description: Sets a queued or running workflow to cancelling and requests Temporal cancellation. Terminal workflows return their current state.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkflowRunId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelWorkflowRunRequest"
      responses:
        "200":
          description: Workflow run after cancellation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/workflow-runs/{workflowRunId}/nodes:
    get:
      operationId: listWorkflowNodeRuns
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkflowRunId"
      responses:
        "200":
          description: Workflow node runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowNodeRunListEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/artifacts:
    get:
      operationId: listArtifacts
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[projectId]
          in: query
          schema:
            type: string
            format: uuid
        - name: includePreviewUrl
          in: query
          schema:
            type: boolean
            default: false
        - name: previewExpiresSeconds
          in: query
          schema:
            type: integer
            default: 900
            maximum: 3600
      responses:
        "200":
          description: Project artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactListEnvelope"
  /api/artifacts/{artifactId}:
    get:
      operationId: getArtifact
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ArtifactId"
      responses:
        "200":
          description: Artifact detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/artifacts/{artifactId}/preview-url:
    post:
      operationId: createArtifactPreviewUrl
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ArtifactId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactPreviewUrlRequest"
      responses:
        "200":
          description: Presigned artifact preview URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactPreviewUrlEnvelope"
        "422":
          $ref: "#/components/responses/Error"
  /api/media-files/{mediaFileId}:
    get:
      operationId: getMediaFile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MediaFileId"
      responses:
        "200":
          description: Media file detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFileEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/media-files/{mediaFileId}/download-url:
    post:
      operationId: createMediaFileDownloadUrl
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/MediaFileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaFileDownloadUrlRequest"
      responses:
        "200":
          description: Presigned media file download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFileDownloadUrlEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/providers/connectors:
    get:
      operationId: listProviderConnectors
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Provider connectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnectorListEnvelope"
  /api/providers/connectors/import:
    post:
      operationId: importProviderConnector
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProviderConnectorRequest"
      responses:
        "201":
          description: Imported connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnectorEnvelope"
  /api/providers/accounts:
    get:
      operationId: listProviderAccounts
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[status]
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Provider accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAccountListEnvelope"
    post:
      operationId: createProviderAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderAccountRequest"
      responses:
        "201":
          description: Created provider account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAccountEnvelope"
  /api/providers/accounts/{accountId}:
    get:
      operationId: getProviderAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Provider account
