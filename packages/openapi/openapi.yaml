        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
        "502":
          $ref: "#/components/responses/GatewayError"
  /internal/provider/video/create-task:
    post:
      operationId: internalProviderVideoCreateTask
      summary: Internal Provider Gateway video task creation
      description: Internal API. Requires bearer service token and creates an asynchronous declarative HTTP video provider task.
      security:
        - serviceTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayVideoCreateTaskRequest"
      responses:
        "200":
          description: Provider video task creation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayVideoCreateTaskEnvelope"
        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
        "502":
          $ref: "#/components/responses/GatewayError"
  /internal/provider/video/poll-task:
    post:
      operationId: internalProviderVideoPollTask
      summary: Internal Provider Gateway video task polling
      description: Internal API. Requires bearer service token, polls upstream status, and stores completed video media in S3 / MinIO.
      security:
        - serviceTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayVideoPollTaskRequest"
      responses:
        "200":
          description: Provider video polling result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayVideoPollTaskEnvelope"
        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
        "502":
          $ref: "#/components/responses/GatewayError"
  /internal/provider/video/cancel-task:
    post:
      operationId: internalProviderVideoCancelTask
      summary: Internal Provider Gateway video task cancellation
      description: Internal API. Requires bearer service token and cancels an upstream task when the manifest exposes a cancel endpoint.
      security:
        - serviceTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayVideoCancelTaskRequest"
      responses:
        "200":
          description: Provider video cancellation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayVideoCancelTaskEnvelope"
        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
        "502":
          $ref: "#/components/responses/GatewayError"
  /internal/provider/text/stream:
    post:
      operationId: internalProviderTextStream
      summary: Internal Provider Gateway text stream
      description: Internal API. Requires bearer service token and streams provider.delta/provider.completed events.
      security:
        - serviceTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayTextRequest"
      responses:
        "200":
          description: Server-sent text stream with provider.delta and provider.completed events
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
  /internal/provider/manifests/test-run:
    post:
      operationId: internalProviderManifestTestRun
      summary: Internal Provider Gateway manifest test run
      description: Internal API. Requires bearer service token and keeps direct provider execution inside Provider Gateway.
      security:
        - serviceTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GatewayManifestTestRunRequest"
      responses:
        "200":
          description: Declarative provider test result executed by Provider Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestTestRunResultEnvelope"
        "401":
          $ref: "#/components/responses/GatewayError"
        "422":
          $ref: "#/components/responses/GatewayError"
        "502":
          $ref: "#/components/responses/GatewayError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    serviceTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: service-token
  parameters:
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetId:
      name: assetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SourceId:
      name: sourceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScriptId:
      name: scriptId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequirementId:
      name: requirementId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ShotId:
      name: shotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WorkflowRunId:
      name: workflowRunId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaFileId:
      name: mediaFileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ModelId:
      name: modelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProfileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BindingId:
      name: bindingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CircuitStateId:
      name: stateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizationHeader:
      name: X-Organization-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 200
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    GatewayError:
      description: Internal Provider Gateway error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayErrorEnvelope"
  schemas:
    Envelope:
      type: object
      required: [requestId]
      properties:
        requestId:
          type: string
        data: {}
        meta: {}
    SystemStatusEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SystemStatus"
    SystemStatus:
      type: object
      required: [status, services, version]
      properties:
        status:
          type: string
          enum: [ok]
        services:
          $ref: "#/components/schemas/SystemServices"
        version:
          type: string
    SystemServices:
      type: object
      required: [database, temporal, storage, providerGateway]
      properties:
        database:
          type: string
          enum: [ok, unknown]
        temporal:
          type: string
          enum: [ok, unknown]
        storage:
          type: string
          enum: [ok, unknown]
        providerGateway:
          type: string
          enum: [ok, unknown]
    ErrorEnvelope:
      type: object
      required: [requestId, error]
      properties:
        requestId:
          type: string
        error:
          $ref: "#/components/schemas/ErrorBody"
    ErrorBody:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
          description: Includes PROVIDER_RATE_LIMITED, PROVIDER_CONCURRENCY_LIMITED, PROVIDER_DAILY_QUOTA_EXCEEDED, PROVIDER_MONTHLY_BUDGET_EXCEEDED, and PROVIDER_CIRCUIT_OPEN for Provider Gateway guard blocks.
        message:
          type: string
        details: {}
        retryable:
          type: boolean
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
        organizationName:
          type: string
        workspaceName:
          type: string
    SystemSetupRequest:
      allOf:
        - $ref: "#/components/schemas/RegisterRequest"
    SetupStateResponseEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SetupStateResponse"
    SetupStateResponse:
