          enum: [video_production, text_to_storyboard, extract_novel_events, generate_adaptation_plan, adaptation_plan_to_script, source_to_script, parse_script_scenes, script_to_assets, script_to_storyboard, script_to_video, full_production, regenerate_canonical_asset_image, regenerate_derived_asset_image, regenerate_shot_image, regenerate_shot_video, regenerate_final_video, regenerate_script_scene, regenerate_scene_storyboard]
