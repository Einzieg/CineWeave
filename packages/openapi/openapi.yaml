openapi: 3.1.0
info:
  title: CineWeave API
  version: 0.1.0
  description: API contract seed for the Phase 1 CineWeave control plane.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/auth/register:
    post:
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user with initial organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/refresh:
    post:
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Rotated refresh token and access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/auth/logout:
    post:
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/auth/me:
    get:
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/provider-webhooks/{providerAccountId}/{webhookSecret}:
    post:
      operationId: receiveProviderWebhook
      parameters:
        - name: providerAccountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: webhookSecret
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderWebhookResultEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /api/organizations:
    get:
      operationId: listOrganizations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations for current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListEnvelope"
    post:
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationEnvelope"
  /api/organizations/{organizationId}:
    get:
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Organization detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationEnvelope"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/workspaces:
    get:
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Workspaces in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListEnvelope"
    post:
      operationId: createWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
  /api/workspaces/{workspaceId}:
    get:
      operationId: getWorkspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceEnvelope"
  /api/projects:
    get:
      operationId: listProjects
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[workspaceId]
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Projects in organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListEnvelope"
    post:
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
  /api/projects/{projectId}:
    get:
      operationId: getProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
    patch:
      operationId: updateProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
    delete:
      operationId: deleteProject
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Deleted project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/projects/{projectId}/assets:
    get:
      operationId: listAssets
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: filter[type]
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Project assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListEnvelope"
    post:
      operationId: createAsset
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "201":
          description: Created asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
        "200":
          description: Idempotent replay of a previous asset create
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
  /api/projects/{projectId}/assets/upload-url:
    post:
      operationId: createAssetUploadUrl
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetUploadUrlRequest"
      responses:
        "201":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetUploadUrlEnvelope"
  /api/projects/{projectId}/assets/{assetId}:
    get:
      operationId: getAsset
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
    patch:
      operationId: updateAsset
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetRequest"
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetEnvelope"
    delete:
      operationId: deleteAsset
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AssetId"
      responses:
        "200":
          description: Deleted asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/projects/{projectId}/assets/{assetId}/variants:
    post:
      operationId: createAssetVariant
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AssetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetVariantRequest"
      responses:
        "201":
          description: Created asset media variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetVariantCreateEnvelope"
        "200":
          description: Idempotent replay of a previous asset variant create
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetVariantCreateEnvelope"
  /api/workflow-runs:
    get:
      operationId: listWorkflowRuns
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[projectId]
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workflow runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunListEnvelope"
    post:
      operationId: createWorkflowRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowRunRequest"
      responses:
        "201":
          description: Created workflow run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunEnvelope"
        "200":
          description: Idempotent replay of a previously created workflow run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunEnvelope"
        "422":
          $ref: "#/components/responses/Error"
  /api/workflow-runs/{workflowRunId}:
    get:
      operationId: getWorkflowRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkflowRunId"
      responses:
        "200":
          description: Workflow run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/workflow-runs/{workflowRunId}/nodes:
    get:
      operationId: listWorkflowNodeRuns
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/WorkflowRunId"
      responses:
        "200":
          description: Workflow node runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowNodeRunListEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/artifacts:
    get:
      operationId: listArtifacts
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[projectId]
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactListEnvelope"
  /api/providers/connectors:
    get:
      operationId: listProviderConnectors
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Provider connectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnectorListEnvelope"
  /api/providers/connectors/import:
    post:
      operationId: importProviderConnector
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProviderConnectorRequest"
      responses:
        "201":
          description: Imported connector
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnectorEnvelope"
  /api/providers/accounts:
    get:
      operationId: listProviderAccounts
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[status]
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Provider accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAccountListEnvelope"
    post:
      operationId: createProviderAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderAccountRequest"
      responses:
        "201":
          description: Created provider account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAccountEnvelope"
  /api/providers/accounts/{accountId}:
    get:
      operationId: getProviderAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Provider account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAccountEnvelope"
    patch:
      operationId: updateProviderAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/AccountId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderAccountRequest"
      responses:
        "200":
          description: Updated provider account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAccountEnvelope"
    delete:
      operationId: deleteProviderAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Disabled provider account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/providers/accounts/{accountId}/credentials/rotate:
    post:
      operationId: rotateProviderCredential
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/AccountId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RotateCredentialRequest"
      responses:
        "200":
          description: Rotated credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAccountEnvelope"
  /api/providers/accounts/{accountId}/discover-models:
    post:
      operationId: discoverProviderModels
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Discovered OpenAI-compatible models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelDiscoveryResultEnvelope"
        "502":
          $ref: "#/components/responses/Error"
  /api/providers/accounts/{accountId}/models:
    get:
      operationId: listProviderModels
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Provider models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModelListEnvelope"
    post:
      operationId: createProviderModel
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/AccountId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderModelRequest"
      responses:
        "201":
          description: Created provider model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModelEnvelope"
  /api/providers/models/{modelId}:
    patch:
      operationId: updateProviderModel
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderModelRequest"
      responses:
        "200":
          description: Updated provider model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderModelEnvelope"
  /api/providers/models/{modelId}/test:
    post:
      operationId: testProviderModel
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestProviderModelRequest"
      responses:
        "201":
          description: Provider model test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderTestResultEnvelope"
        "200":
          description: Idempotent replay of a previous provider model test
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderTestResultEnvelope"
  /api/providers/manifests/validate:
    post:
      operationId: validateProviderManifest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateManifestRequest"
      responses:
        "200":
          description: Manifest validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestValidationEnvelope"
  /api/providers/manifests/test-run:
    post:
      operationId: runProviderManifestTest
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManifestTestRunRequest"
      responses:
        "201":
          description: Declarative provider test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestTestRunResultEnvelope"
        "200":
          description: Idempotent replay of a previous declarative provider test
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestTestRunResultEnvelope"
  /api/model-profiles:
    get:
      operationId: listModelProfiles
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Model profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProfileListEnvelope"
    post:
      operationId: createModelProfile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelProfileRequest"
      responses:
        "201":
          description: Created model profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProfileEnvelope"
  /api/model-profiles/{profileId}:
    patch:
      operationId: updateModelProfile
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/ProfileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateModelProfileRequest"
      responses:
        "200":
          description: Updated model profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProfileEnvelope"
  /api/model-profiles/{profileId}/bindings:
    post:
      operationId: createModelProfileBinding
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/ProfileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelProfileBindingRequest"
      responses:
        "201":
          description: Created model profile binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelProfileEnvelope"
  /api/model-profiles/{profileId}/bindings/{bindingId}:
    delete:
      operationId: deleteModelProfileBinding
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - $ref: "#/components/parameters/ProfileId"
        - $ref: "#/components/parameters/BindingId"
      responses:
        "200":
          description: Deleted binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/provider-call-logs:
    get:
      operationId: listProviderCallLogs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
        - name: filter[projectId]
          in: query
          schema:
            type: string
            format: uuid
        - name: filter[status]
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Provider call logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderCallLogListEnvelope"
  /api/provider-usage/summary:
    get:
      operationId: getProviderUsageSummary
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OrganizationHeader"
      responses:
        "200":
          description: Provider usage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderUsageSummaryEnvelope"
  /internal/provider/models/discover:
    post:
      operationId: internalProviderDiscoverModels
      security:
        - serviceTokenAuth: []
      requestBody:
