        organizationCount:
          type: integer
          minimum: 0
    SystemSetupResponseEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SystemSetupResponse"
    SystemSetupResponse:
      allOf:
        - $ref: "#/components/schemas/AuthToken"
