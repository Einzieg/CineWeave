kind: ProviderConnector
version: v1
id: cineweave-mock-video
name: CineWeave Mock Video
transport: http
baseUrl: http://mock-provider:19180
auth:
  type: bearer
  header: Authorization
  valueTemplate: "Bearer {{ credential.apiKey }}"
models:
  - id: cw-mock-video
    displayName: CineWeave Mock Video
    modality: video
    capabilities:
      taskTypes: ["video.generate"]
      inputLimits:
        maxPromptChars: 4000
      outputLimits:
        maxDurationSeconds: 15
      qualityTiers: ["standard"]
      providerOptionsSchema:
        type: object
      pricingPolicy:
        currency: USD
        videoCostFlat: "0.0000"
endpoints:
  video_create:
    endpointType: async_create
    method: POST
    pathTemplate: /video/create
    pollEndpointKey: video_poll
    requestTemplate:
      model: "{{ model.id }}"
      prompt: "{{ input.prompt }}"
      duration: "{{ input.duration }}"
      aspect_ratio: "{{ input.aspectRatio }}"
      resolution: "{{ input.resolution }}"
    responseMapping:
      externalTaskId: "$.taskId"
      status: "$.status"
    timeoutMs: 3000
    pollIntervalMs: 1000
    maxPolls: 30
  video_poll:
    endpointType: async_poll
    method: POST
    pathTemplate: /video/poll
    requestTemplate:
      taskId: "{{ task.externalTaskId }}"
    responseMapping:
      externalTaskId: "$.taskId"
      status: "$.status"
      videoUrl: "$.videoUrl"
      mimeType: "$.mimeType"
      durationSeconds: "$.durationSeconds"
    timeoutMs: 3000
  video_cancel:
    endpointType: sync
    method: POST
    pathTemplate: /video/cancel
    requestTemplate:
      taskId: "{{ task.externalTaskId }}"
    responseMapping:
      externalTaskId: "$.taskId"
      status: "$.status"
    timeoutMs: 3000
