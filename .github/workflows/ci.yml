name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Go tests
        run: go test ./...

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Web typecheck
        run: pnpm --filter @cineweave/web typecheck

      - name: Web lint
        run: pnpm --filter @cineweave/web lint

      - name: OpenAPI YAML parse
        run: |
          python -m pip install --disable-pip-version-check pyyaml
          python - <<'PY'
          import pathlib
          import yaml
          yaml.safe_load(pathlib.Path("packages/openapi/openapi.yaml").read_text(encoding="utf-8"))
          PY

      - name: Compose config
        run: docker compose -f compose.yml config --quiet

      - name: Compose build
        run: docker compose -f compose.yml build api provider-gateway script-worker media-worker web mock-provider
